<!DOCTYPE html>
<html lang="en">
<head>
    <title>Hospital Navigator | Pro</title>
    <link rel="stylesheet" href="static/style.css">
</head>

<body>

<div class="sidebar">
    <h2>Navigation</h2>

    <div class="input-group">
        <label>Start Room</label>
        <input id="start" placeholder="e.g. 004">
    </div>

    <div class="input-group">
        <label>Destination</label>
        <input id="end" placeholder="e.g. 1112">
    </div>

    <button onclick="getRoute()">Find Path</button>

    <div id="output">
        <p style="color:#94a3b8;">Enter rooms to begin...</p>
    </div>
</div>

<div class="map-wrapper">
    <img id="map" />
    <canvas id="overlay"></canvas>
</div>

<script>
const map = document.getElementById("map");
const canvas = document.getElementById("overlay");
const ctx = canvas.getContext("2d");

let currentFloor = null;
const scale = 6;

// -----------------------------
function loadFloor(floor) {
    return new Promise(resolve => {

        const fileName = floor.toLowerCase().replaceAll(" ", "_") + ".png";
        const path = `/blueprints/${fileName}`;

        map.onload = () => {
            // match canvas to image display size
            canvas.width = map.clientWidth;
            canvas.height = map.clientHeight;
            resolve();
        };

        map.src = path;
    });
}

// -----------------------------
function clearOverlay() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// -----------------------------
function drawNode(x, y, color, label) {
    ctx.beginPath();
    ctx.arc(x * scale, y * scale, 5, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
}

// -----------------------------
function drawLine(x1, y1, x2, y2) {
    ctx.beginPath();
    ctx.moveTo(x1 * scale, y1 * scale);
    ctx.lineTo(x2 * scale, y2 * scale);
    ctx.strokeStyle = "#38bdf8";
    ctx.lineWidth = 2;
    ctx.stroke();
}

// -----------------------------
async function getRoute() {

    const start = document.getElementById("start").value;
    const end = document.getElementById("end").value;

    const res = await fetch("/route", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ start, end })
    });

    const data = await res.json();

    const out = document.getElementById("output");
    out.innerHTML = "";

    if (data.error) {
        out.innerHTML = `<div class="step" style="color:red">${data.error}</div>`;
        return;
    }

    const path = data.path; // backend MUST send path

    clearOverlay();

    for (let i = 0; i < path.length; i++) {

        const node = path[i];

        if (node.floor !== currentFloor) {
            currentFloor = node.floor;
            await loadFloor(currentFloor);
            clearOverlay();
        }

        drawNode(node.x, node.y, "#38bdf8", node.room);

        if (i < path.length - 1) {
            const next = path[i + 1];

            if (next.floor === node.floor) {
                drawLine(node.x, node.y, next.x, next.y);
            }
        }
    }

    const startNode = path[0];
    const endNode = path[path.length - 1];

    drawNode(startNode.x, startNode.y, "lime", "START");
    drawNode(endNode.x, endNode.y, "red", "END");
}
</script>

</body>
</html>
