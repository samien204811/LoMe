<!DOCTYPE html>
<html lang="en">
<head>
    <title>LoMe | Hospital</title>
    <link rel="stylesheet" href="static/style.css">
</head>

<body>

<div class="sidebar">
    <h2>LoMe | Hospital</h2>

    <div class="input-group">
        <label>Start Room</label>
        <input id="start" placeholder="e.g. 004">
    </div>

    <div class="input-group">
        <label>Destination</label>
        <input id="end" placeholder="e.g. 1112">
    </div>

    <button onclick="getRoute()">Find Path</button>

    <div id="output">
        <p style="color:#94a3b8;">Enter rooms to begin...</p>
    </div>
</div>

<div class="map-wrapper">
<img id="map" style="width:100%; height:100%; object-fit:contain;" />
</div>

<script>
const map = document.getElementById("map");
const canvas = document.getElementById("overlay");
const ctx = canvas.getContext("2d");

let currentFloor = null;
const scale = 6;

// -----------------------------
function loadFloor(floor) {
    return new Promise(resolve => {

        const fileName = floor
            .toLowerCase()
            .replaceAll(" ", "_") + ".png";

        const path = `/blueprints/${fileName}`;

        const img = new Image();

        img.onload = () => {
            const map = document.getElementById("map");

            map.src = path;

            map.onload = () => resolve();
        };

        img.src = path;
    });
}


// -----------------------------
async function getRoute() {

    const start = document.getElementById("start").value;
    const end = document.getElementById("end").value;

    const res = await fetch("/route", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ start, end })
    });

    const data = await res.json();
    console.log(data);

    const out = document.getElementById("output");
    out.innerHTML = "";

    if (data.error) {
        out.innerHTML = `<div class="step" style="color:red">${data.error}</div>`;
        return;
    }

    // -----------------------------
    // TEXT STEPS ONLY
    // -----------------------------
    const steps = data.steps || [];

    if (steps.length === 0) {
        out.innerHTML = `<div class="step">No navigation steps available.</div>`;
    } else {
        steps.forEach(step => {
            const div = document.createElement("div");
            div.className = "step";
            div.innerText = step;
            out.appendChild(div);
        });
    }

    // -----------------------------
    // FLOOR DISPLAY ONLY (NO OVERLAY)
    // -----------------------------
    const path = data.path;
    if (!path || path.length === 0) return;

    // show ONLY first floor initially
    let currentFloor = path[0].floor;
    await loadFloor(currentFloor);

    // optional: auto-switch floor when path changes floor
    for (let i = 1; i < path.length; i++) {
        const node = path[i];

        if (node.floor !== currentFloor) {
            currentFloor = node.floor;
            await loadFloor(currentFloor);
        }
    }
}
</script>

</body>
</html>
