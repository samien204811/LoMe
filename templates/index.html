<!DOCTYPE html>
<html lang="en">
<head>
    <title>Hospital Navigator | Pro</title>

    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 350px;
            background: var(--panel);
            padding: 25px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
        }

        h2 { color: var(--accent); margin-top: 0; }

        .input-group { margin-bottom: 15px; }

        input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        #output {
            margin-top: 20px;
            border-top: 1px solid #334155;
            padding-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .step {
            background: #334155;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 6px;
            font-size: 0.85em;
        }

        .map-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            background: #0b1220;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>Navigation</h2>

    <div class="input-group">
        <label>Start Room</label>
        <input id="start" placeholder="e.g. 004">
    </div>

    <div class="input-group">
        <label>Destination</label>
        <input id="end" placeholder="e.g. 1112">
    </div>

    <button onclick="getRoute()">Find Path</button>

    <div id="output">
        <p style="color:#94a3b8;">Enter rooms to begin...</p>
    </div>
</div>

<div class="map-wrapper">
    <canvas id="canvas" width="900" height="650"></canvas>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const scale = 6;
let currentFloor = null;
let floorImage = new Image();

// -----------------------------
// LOAD FLOOR IMAGE
// -----------------------------
function loadFloor(floor) {
    return new Promise(resolve => {

        const fileName = floor
            .toLowerCase()
            .replaceAll(" ", "_") + ".png";

        const path = `/blueprints/${fileName}`;

        floorImage = new Image();

        floorImage.onload = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(floorImage, 0, 0, canvas.width, canvas.height);
            resolve();
        };

        floorImage.src = path;
    });
}

// -----------------------------
// DRAW NODE
// -----------------------------
function drawNode(x, y, color, label) {
    const px = x * scale;
    const py = y * scale;

    ctx.beginPath();
    ctx.arc(px, py, 6, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    ctx.fillStyle = "white";
    ctx.font = "10px Segoe UI";
    ctx.fillText(label, px + 8, py - 6);
}

// -----------------------------
// DRAW LINE
// -----------------------------
function drawLine(x1, y1, x2, y2) {
    ctx.beginPath();
    ctx.moveTo(x1 * scale, y1 * scale);
    ctx.lineTo(x2 * scale, y2 * scale);
    ctx.strokeStyle = "#38bdf8";
    ctx.lineWidth = 2;
    ctx.stroke();
}

// -----------------------------
// MAIN ROUTE FUNCTION
// -----------------------------
async function getRoute() {

    const start = document.getElementById("start").value;
    const end = document.getElementById("end").value;

    const res = await fetch("/route", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ start, end })
    });

    const data = await res.json();

    const out = document.getElementById("output");
    out.innerHTML = "";

    if (data.error) {
        out.innerHTML = `<div class="step" style="color:red">${data.error}</div>`;
        return;
    }

    // -----------------------------
    // TEXT STEPS
    // -----------------------------
    data.steps.forEach(s => {
        const div = document.createElement("div");
        div.className = "step";
        div.innerText = s;
        out.appendChild(div);
    });

    // -----------------------------
    // VISUAL PATH
    // -----------------------------
    const path = data.path;
    if (!path || path.length === 0) return;

    for (let i = 0; i < path.length; i++) {

        const node = path[i];

        // load floor if changed
        if (node.floor !== currentFloor) {
            currentFloor = node.floor;
            await loadFloor(currentFloor);
        }

        // draw node
        drawNode(node.x, node.y, "#38bdf8", node.room);

        // draw connection
        if (i < path.length - 1) {
            const next = path[i + 1];

            if (next.floor === node.floor) {
                drawLine(node.x, node.y, next.x, next.y);
            }
        }
    }

    // -----------------------------
    // START / END MARKERS
    // -----------------------------
    const startNode = path[0];
    const endNode = path[path.length - 1];

    drawNode(startNode.x, startNode.y, "lime", "START");
    drawNode(endNode.x, endNode.y, "red", "END");
}
</script>

</body>
</html>
